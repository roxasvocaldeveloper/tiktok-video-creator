<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ads Creator | Soundvertise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Courier+Prime:wght@400;700&family=Inter:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.js"></script>
    <style>
        :root { --sv-purple: #8B5CF6; --sv-blue: #3B82F6; --sv-bg: #050505; }
        body { background-color: var(--sv-bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; overflow-x: hidden; }
        .preview-column { display: flex; flex-direction: column; align-items: center; }
        .iphone-frame { width: 290px; height: calc(290px * 16 / 9); border: 10px solid #1A1A1A; border-radius: 42px; position: relative; background: #000; overflow: hidden; box-shadow: 0 0 0 2px #000, 0 20px 50px rgba(0,0,0,0.5); }
        .notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 75px; height: 22px; background: #000; border-radius: 20px; z-index: 50; border: 1px solid #222; }
        .video-container { width: 100%; height: 100%; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
        #caption-overlay {
            position: absolute;
            cursor: move;
            user-select: none;
            text-align: center;
            max-width: 85%;
            z-index: 30;
            line-height: 1.1;
            left: 50%;
            transform: translateX(-50%);
            --outline-color: #000000;
            white-space: pre;
        }
        #caption-overlay:not(.dragging) { transition: top 0.1s ease-out; }
        .text-bold-outline {
            text-shadow: 0 0 1px var(--outline-color),
                -1.5px -1.5px 0 var(--outline-color), 1.5px -1.5px 0 var(--outline-color),
                -1.5px 1.5px 0 var(--outline-color), 1.5px 1.5px 0 var(--outline-color),
                0px 3px 8px rgba(0,0,0,0.6);
        }
        .tiktok-ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 40; display: block; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.2) 100%); }
        .right-actions { position: absolute; right: 8px; bottom: 85px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .action-text { font-size: 8px; font-weight: 600; }
        .bottom-info { position: absolute; left: 12px; bottom: 20px; max-width: 190px; }
        .trimmer-track { position: relative; width: 100%; background: #111; border-radius: 12px; border: 1px solid #333; overflow: hidden; cursor: pointer; }
        .thumbnail-track { position: absolute; inset: 0; display: flex; pointer-events: none; opacity: 0.4; }
        .thumbnail-track canvas { height: 100%; flex: 1; object-fit: cover; }
        .trim-overlay { position: absolute; top: 0; height: 100%; z-index: 5; cursor: grab; border-radius: 6px; }
        #video-trim-overlay { background: rgba(59,130,246,0.2); border: 3px solid var(--sv-blue); }
        #audio-trim-overlay { background: rgba(139,92,246,0.15); border: 3px solid var(--sv-purple); box-shadow: 0 0 20px rgba(139,92,246,0.3); }
        .playhead-cursor { position: absolute; top: 0; width: 2px; height: 100%; background: #fff; z-index: 20; pointer-events: none; box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .trim-handle { position: absolute; top: 0; width: 16px; height: 100%; background: inherit; cursor: ew-resize; display: flex; align-items: center; justify-content: center; z-index: 10; }
        #video-trim-overlay .trim-handle { background-color: var(--sv-blue); }
        #audio-trim-overlay .trim-handle { display: none; }
        .trim-handle::after { content: ''; width: 2px; height: 14px; background: white; border-radius: 1px; }
        .handle-left { left: -8px; border-radius: 6px 0 0 6px; }
        .handle-right { right: -8px; border-radius: 0 6px 6px 0; }
        .waveform-wrapper { position: relative; width: 100%; height: 70px; background: #000; }
        #waveform { width: 100%; height: 100%; pointer-events: none; }
        .btn-sv { background: linear-gradient(135deg, var(--sv-blue) 0%, var(--sv-purple) 100%); transition: all 0.3s ease; }
        .btn-sv:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-sv:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .font-tiktok { font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: -0.5px; }
        .font-typewriter { font-family: 'Courier Prime', monospace; }
        .font-classic { font-family: 'Inter', sans-serif; font-weight: 800; }
        .font-handwriting { font-family: 'Dancing Script', cursive; font-weight: 700; }
        .font-btn { background: #000; border: 1px solid #333; padding: 8px 12px; border-radius: 10px; font-size: 10px; transition: all 0.2s; color: #666; }
        .font-btn.active { border-color: var(--sv-blue); background: rgba(59,130,246,0.1); color: #fff; }
        .color-wrapper { position: relative; width: 36px; height: 36px; border-radius: 8px; border: 1px solid #333; overflow: hidden; background: #000; flex-shrink: 0; }
        .color-input { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; cursor: pointer; }
        .toggle-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 12px; background: #111; border: 1px solid #333; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: all 0.2s; color: #666; cursor: pointer; }
        .toggle-btn.active { background: rgba(59,130,246,0.15); border-color: var(--sv-blue); color: #fff; }
        .caption-cat-btn { background: #000; border: 1px solid #333; padding: 6px 10px; border-radius: 8px; font-size: 9px; font-weight: 800; text-transform: uppercase; transition: all 0.2s; color: #666; cursor: pointer; }
        .caption-cat-btn.active { border-color: var(--sv-purple); background: rgba(139,92,246,0.15); color: #fff; }
        .caption-cat-btn:hover { border-color: var(--sv-purple); color: #fff; }
        #render-canvas { display: none; }
        .queue-item { background: rgba(0,0,0,0.4); border: 1px solid #333; padding: 6px 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: all 0.2s; }
        .queue-item.active { border-color: var(--sv-blue); background: rgba(59,130,246,0.15); }
        .queue-item:hover { border-color: var(--sv-blue); }
        .queue-item-info { flex: 1; min-width: 0; }
        .queue-item-caption { font-size: 10px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-item-meta { font-size: 8px; color: #888; margin-top: 1px; }
        .queue-item-actions { display: flex; gap: 4px; }
        .queue-item-btn { padding: 4px; background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .queue-item-btn:hover { background: rgba(255,255,255,0.1); border-color: #666; }
    </style>
</head>
<body class="p-4 md:p-6">
<div class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">

    <!-- LEFT: Preview + Bulk Panel -->
    <div class="preview-column space-y-4 order-2 lg:order-1">

        <!-- BULK PANEL — in cima alla colonna sinistra -->
        <div class="w-full space-y-3 p-4 bg-gradient-to-br from-blue-950/40 to-violet-950/40 rounded-2xl border border-blue-800/30">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black uppercase text-blue-300 tracking-widest">🎬 Bulk</span>
                    <span id="queue-count" class="text-violet-400 font-mono text-[10px] font-bold">0/20</span>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button id="auto-queue-btn" class="px-3 py-1.5 bg-violet-600 hover:bg-violet-500 rounded-lg text-[9px] font-black uppercase transition-all flex items-center gap-1.5"><i data-lucide="zap" class="w-3 h-3"></i>Auto</button>
                    <button id="prev-video-btn" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-[9px] font-black uppercase transition-all flex items-center gap-1.5"><i data-lucide="chevron-left" class="w-3 h-3"></i>Prev</button>
                    <button id="add-to-queue-btn" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded-lg text-[9px] font-black uppercase transition-all flex items-center gap-1.5"><i data-lucide="plus" class="w-3 h-3"></i>Add</button>
                    <button id="next-video-btn" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-[9px] font-black uppercase transition-all flex items-center gap-1.5">Next<i data-lucide="chevron-right" class="w-3 h-3"></i></button>
                </div>
            </div>
            <div id="queue-list" class="space-y-1 max-h-28 overflow-y-auto"></div>
        </div>

        <!-- iPhone Preview -->
        <div class="iphone-frame" id="iphone">
            <div class="notch"></div>
            <div class="video-container" id="drop-zone">
                <video id="main-video" crossorigin="anonymous" playsinline loop muted></video>
                <div id="caption-overlay" class="font-tiktok text-bold-outline" style="top:35%;font-size:12px;color:white;">Scrivi il tuo testo</div>
                <div id="safe-guide" class="tiktok-ui-overlay">
                    <div class="right-actions">
                        <div class="action-item flex flex-col items-center">
                            <div class="w-9 h-9 rounded-full border border-white bg-zinc-800 mb-1 overflow-hidden">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=SV" alt="avatar">
                            </div>
                        </div>
                        <div class="action-item flex flex-col items-center">
                            <i data-lucide="heart" class="text-white fill-white w-7 h-7"></i>
                            <span class="action-text text-white">580K</span>
                        </div>
                        <div class="action-item flex flex-col items-center">
                            <i data-lucide="message-circle" class="text-white fill-white w-7 h-7"></i>
                            <span class="action-text text-white">2.4K</span>
                        </div>
                    </div>
                    <div class="bottom-info space-y-0.5">
                        <p class="font-bold text-[11px]">@soundvertise.co</p>
                        <p class="text-[10px] opacity-90 leading-tight">Video creato con Soundvertise.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex gap-3">
            <button id="toggle-guide" class="flex-1 px-5 py-2 bg-zinc-900 rounded-full text-[9px] font-black uppercase border border-zinc-800 hover:border-blue-500 transition-all text-zinc-400 hover:text-white">Anteprima TikTok UI</button>
            <button id="toggle-watermark" class="toggle-btn"><i data-lucide="zoom-in" class="w-3.5 h-3.5"></i> Remove VEO</button>
        </div>
    </div>

    <!-- RIGHT: Editor -->
    <div class="bg-zinc-900/40 border border-zinc-800 p-6 rounded-[2rem] space-y-5 backdrop-blur-xl order-1 lg:order-2">
        <header class="flex justify-between items-end border-b border-zinc-800/50 pb-4">
            <div>
                <h1 class="text-xl font-black italic uppercase">Video <span class="text-blue-400">Ads Creator</span></h1>
                <p class="text-[9px] font-bold tracking-widest text-zinc-600">SOUNDVERTISE</p>
            </div>
            <div class="text-right">
                <span id="video-dur-label" class="text-blue-400 font-mono text-xs font-bold uppercase block">Video: 15.0s</span>
            </div>
        </header>

        <!-- File inputs -->
        <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase text-zinc-500">Video (Max 20)</label>
                <label for="video-input" class="flex items-center gap-2 bg-black border border-zinc-800 p-3 rounded-xl cursor-pointer hover:border-blue-500 transition-all">
                    <i data-lucide="video" class="w-4 h-4 text-blue-400 shrink-0"></i>
                    <span class="text-[10px] text-zinc-400 truncate" id="video-label">Carica Video</span>
                    <input type="file" id="video-input" accept="video/*" multiple class="hidden">
                </label>
                <div id="video-files-list" class="text-[9px] text-zinc-500"></div>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase text-zinc-500">Audio (Max 20)</label>
                <label for="audio-input" class="flex items-center gap-2 bg-black border border-zinc-800 p-3 rounded-xl cursor-pointer hover:border-violet-500 transition-all">
                    <i data-lucide="music" class="w-4 h-4 text-violet-400 shrink-0"></i>
                    <span class="text-[10px] text-zinc-400 truncate" id="audio-label">Carica Audio</span>
                    <input type="file" id="audio-input" accept="audio/*" multiple class="hidden">
                </label>
                <div id="audio-files-list" class="text-[9px] text-zinc-500"></div>
            </div>
        </div>

        <!-- Video Trimmer -->
        <div class="space-y-2">
            <div class="flex justify-between items-center text-[9px] font-black uppercase text-zinc-500">
                <span>Ritaglia Clip (Max 30s)</span><span id="v-range-text">0.0s - 15.0s</span>
            </div>
            <div class="trimmer-track h-[50px]" id="v-trimmer-track">
                <div class="thumbnail-track" id="v-thumbs"></div>
                <div id="video-playhead" class="playhead-cursor" style="left:0;display:none;"></div>
                <div id="video-trim-overlay" class="trim-overlay">
                    <div class="trim-handle handle-left" id="v-handle-l"></div>
                    <div class="trim-handle handle-right" id="v-handle-r"></div>
                </div>
            </div>
        </div>

        <!-- Audio -->
        <div class="space-y-2 bg-black p-3 rounded-2xl border border-zinc-800/50">
            <div class="flex items-center gap-3">
                <button id="play-btn" class="w-10 h-10 rounded-xl btn-sv text-white flex items-center justify-center shadow-lg shrink-0">
                    <i data-lucide="play" id="play-icon" class="w-4 h-4 fill-white"></i>
                </button>
                <div class="flex-1 space-y-1">
                    <div class="flex justify-between items-center text-[9px] font-black uppercase text-zinc-500">
                        <span>Waveform</span>
                        <div class="flex items-center gap-2">
                            <select id="audio-selector" class="bg-zinc-900 border border-zinc-700 rounded px-2 py-1 text-[9px] text-zinc-300 font-bold cursor-pointer hover:border-violet-500 transition-all">
                                <option value="">Nessun Audio</option>
                            </select>
                            <span id="audio-start-label" class="text-zinc-500">Start: 0.0s</span>
                        </div>
                    </div>
                    <div class="trimmer-track h-[60px]" id="a-trimmer-track">
                        <div class="waveform-wrapper"><canvas id="waveform"></canvas></div>
                        <div id="audio-playhead" class="playhead-cursor" style="left:0;display:none;"></div>
                        <div id="audio-trim-overlay" class="trim-overlay"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Caption Editor -->
        <div class="p-4 bg-zinc-900/60 rounded-2xl border border-zinc-800 space-y-3">
            <!-- Viral captions -->
            <div class="space-y-2 p-3 bg-gradient-to-br from-violet-950/30 to-blue-950/30 rounded-xl border border-violet-800/30">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-black uppercase text-violet-300 tracking-widest">✨ Caption Virali</span>
                    <button id="random-caption-btn" class="px-3 py-1 bg-violet-600 hover:bg-violet-500 rounded-lg text-[9px] font-black uppercase transition-all flex items-center gap-1">
                        <i data-lucide="shuffle" class="w-3 h-3"></i>Random
                    </button>
                </div>
                <div class="grid grid-cols-5 gap-1">
                    <button class="caption-cat-btn active" data-category="energy">Energy</button>
                    <button class="caption-cat-btn" data-category="chill">Chill</button>
                    <button class="caption-cat-btn" data-category="emotional">Emotional</button>
                    <button class="caption-cat-btn" data-category="party">Party</button>
                    <button class="caption-cat-btn" data-category="nostalgic">Nostalgic</button>
                    <button class="caption-cat-btn" data-category="romantic">Romantic</button>
                    <button class="caption-cat-btn" data-category="dark">Dark</button>
                    <button class="caption-cat-btn" data-category="uplifting">Uplifting</button>
                    <button class="caption-cat-btn" data-category="sensual">Sensual</button>
                    <button class="caption-cat-btn" data-category="dreamy">Dreamy</button>
                    <button class="caption-cat-btn" data-category="relatable">Relatable</button>
                    <button class="caption-cat-btn" data-category="savage">Savage</button>
                    <button class="caption-cat-btn" data-category="aesthetic">Aesthetic</button>
                    <button class="caption-cat-btn" data-category="chaotic">Chaotic</button>
                    <button class="caption-cat-btn" data-category="main">Main Char</button>
                </div>
            </div>

            <textarea id="caption-input" rows="2" placeholder="Scrivi il testo qui..." class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none resize-none font-semibold"></textarea>

            <div class="grid grid-cols-4 gap-2">
                <button class="font-btn active" data-font="font-tiktok">TIKTOK</button>
                <button class="font-btn" data-font="font-typewriter">RETRO</button>
                <button class="font-btn" data-font="font-classic">BOLD</button>
                <button class="font-btn" data-font="font-handwriting">SCRIPT</button>
            </div>

            <div class="space-y-3">
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] font-black text-zinc-500 uppercase tracking-widest">
                        <span>Dimensione</span><span id="fs-val" class="text-blue-400">12px</span>
                    </div>
                    <input type="range" id="font-size" min="12" max="60" value="12" class="w-full accent-blue-500 h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex flex-col gap-3 p-3 bg-black/40 rounded-xl border border-zinc-800/50">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="color-wrapper"><input type="color" id="text-color" value="#ffffff" class="color-input"></div>
                            <span class="text-[9px] font-black text-zinc-400 uppercase">Colore Testo</span>
                        </div>
                        <div class="h-5 w-[1px] bg-zinc-800"></div>
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black text-zinc-400 uppercase">Contorno</span>
                            <div class="color-wrapper"><input type="color" id="outline-color" value="#000000" class="color-input"></div>
                        </div>
                    </div>
                    <button id="outline-toggle" class="toggle-btn active justify-center w-full">
                        <i data-lucide="check" class="w-3.5 h-3.5"></i> Contorno Attivo
                    </button>
                </div>
            </div>
        </div>

        <!-- Export buttons -->
        <div class="grid grid-cols-2 gap-3">
            <button id="export-btn" class="btn-sv text-white font-black py-3 rounded-2xl flex items-center justify-center gap-2 uppercase tracking-widest text-[10px]">
                <i data-lucide="download" class="w-4 h-4"></i> Esporta
            </button>
            <button id="export-all-btn" class="bg-gradient-to-r from-violet-600 to-blue-600 text-white font-black py-3 rounded-2xl flex items-center justify-center gap-2 uppercase tracking-widest text-[10px] disabled:opacity-50 disabled:cursor-not-allowed hover:from-violet-500 hover:to-blue-500 transition-all">
                <i data-lucide="download-cloud" class="w-4 h-4"></i> Esporta Tutti (<span id="export-count">0</span>)
            </button>
        </div>

        <div id="export-status" class="hidden bg-black border border-zinc-800 p-4 rounded-2xl">
            <div class="flex justify-between text-[10px] mb-2 font-black uppercase text-blue-400">
                <span id="status-text">Preparazione...</span><span id="percent-text">0%</span>
            </div>
            <div class="w-full bg-zinc-900 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all"></div>
            </div>
        </div>
    </div>
</div>

<audio id="bg-music" crossorigin="anonymous"></audio>
<canvas id="render-canvas"></canvas>
<video id="source-video" style="display:none;"></video>

<script>
lucide.createIcons();

const video          = document.getElementById('main-video');
const audio          = document.getElementById('bg-music');
const caption        = document.getElementById('caption-overlay');
const videoContainer = document.getElementById('drop-zone');
const vTrimOverlay   = document.getElementById('video-trim-overlay');
const aTrimOverlay   = document.getElementById('audio-trim-overlay');
const vTrimmerTrack  = document.getElementById('v-trimmer-track');
const aTrimmerTrack  = document.getElementById('a-trimmer-track');
const vPlayhead      = document.getElementById('video-playhead');
const aPlayhead      = document.getElementById('audio-playhead');
const waveCanvas     = document.getElementById('waveform');
const waveCtx        = waveCanvas.getContext('2d');

let videoFile, audioFile;
let videoDuration = 0, audioDuration = 0;
let vStart = 0, vEnd = 15, aStart = 0;
const MAX_DUR = 30;
let outlineEnabled = true, removeWatermark = false;
let isDraggingV = null, isDraggingA = false, dragOffsetV = 0, dragOffsetA = 0;
let videoLibrary = [], audioLibrary = [];
let currentVideoIndex = 0, currentAudioIndex = -1;
const MAX_QUEUE_SIZE = 20;
let videoQueue = [], currentQueueIndex = -1;

function notify(msg, color = 'green') {
    const d = document.createElement('div');
    d.className = `fixed top-4 right-4 bg-${color}-500 text-white px-4 py-2 rounded-lg font-bold text-sm z-50`;
    d.innerText = msg; document.body.appendChild(d); setTimeout(() => d.remove(), 2000);
}

// ── Caption text ──
function setCaptionText(t) { caption.textContent = t || 'Scrivi il tuo testo'; }
document.getElementById('caption-input').oninput = (e) => setCaptionText(e.target.value);

// ════════════════════════════════════════════════════════════
// SNAPSHOT — cattura posizione e stile del caption
// ════════════════════════════════════════════════════════════
function snapshotCaption() {
    const cr = videoContainer.getBoundingClientRect();
    const br = caption.getBoundingClientRect();

    // Centro del caption come ratio — per textAlign: 'center' nel canvas
    const centerXRatio = (br.left - cr.left + br.width / 2) / cr.width;
    const topRatio     = (br.top  - cr.top) / cr.height;
    const fontSizeRatio = (parseInt(caption.style.fontSize) || 12) / cr.height;
    const lineHeightRatio = (parseInt(caption.style.fontSize) || 12) * 1.1 / cr.height;

    let fontFamily = 'Montserrat';
    if (caption.className.includes('font-typewriter'))    fontFamily = 'Courier Prime';
    else if (caption.className.includes('font-classic'))  fontFamily = 'Inter';
    else if (caption.className.includes('font-handwriting')) fontFamily = 'Dancing Script';

    return {
        text: caption.textContent,
        centerXRatio,   // ← centro orizzontale come ratio
        topRatio,
        fontSizeRatio,
        lineHeightRatio,
        fontFamily,
        color:        caption.style.color || '#ffffff',

// ════════════════════════════════════════════════════════════
// DRAW CAPTION — textAlign: 'center' sul centro X scalato
// Identico alla preview: centrato, \n rispettati, spazi multipli preservati
// ════════════════════════════════════════════════════════════
function drawCaptionOnCanvas(ctx, snap, canvasW, canvasH) {
    if (!snap || !snap.text || snap.text.trim() === 'Scrivi il tuo testo') return;

    const fontSize   = snap.fontSizeRatio   * canvasH;
    const lineHeight = snap.lineHeightRatio * canvasH;
    const centerX    = snap.centerXRatio    * canvasW;  // ← centro X sul canvas
    const startY     = snap.topRatio        * canvasH;

    ctx.font         = `800 ${fontSize}px ${snap.fontFamily}`;
    ctx.textAlign    = 'center';   // ← centrato come nel preview CSS
    ctx.textBaseline = 'top';

    const lines = snap.text.split('\n');

    lines.forEach((line, i) => {
        const y = startY + i * lineHeight;
        if (snap.hasOutline) {
            ctx.strokeStyle = snap.outlineColor;
            ctx.lineWidth   = Math.max(fontSize * 0.12, 2);
            ctx.lineJoin    = 'round';
            ctx.miterLimit  = 2;
            ctx.strokeText(line, centerX, y);
        }
        ctx.fillStyle = snap.color;
        ctx.fillText(line, centerX, y);
    });
}

async function drawWaveform(file) {
    const ac = new (window.AudioContext || window.webkitAudioContext)(), decoded = await ac.decodeAudioData(await file.arrayBuffer()), raw = decoded.getChannelData(0), samples = 120, block = Math.floor(raw.length / samples);
    const data = Array.from({ length: samples }, (_, i) => { let s = 0; for (let j = 0; j < block; j++) s += Math.abs(raw[i * block + j]); return s / block; });
    const max = Math.max(...data); waveCanvas.width = waveCanvas.offsetWidth * 2; waveCanvas.height = waveCanvas.offsetHeight * 2;
    const step = waveCanvas.width / samples, grad = waveCtx.createLinearGradient(0, 0, waveCanvas.width, 0);
    grad.addColorStop(0, '#3B82F6'); grad.addColorStop(1, '#8B5CF6'); waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height); waveCtx.fillStyle = grad;
    data.forEach((v, i) => { const h = (v / max) * waveCanvas.height * 0.8; waveCtx.beginPath(); waveCtx.roundRect(i * step, (waveCanvas.height - h) / 2, step - 3, h, 2); waveCtx.fill(); });
}

}

// ════════════════════════════════════════════════════════════
// EXPORT CORE
// ════════════════════════════════════════════════════════════
async function runExport(item, filename, onProgress) {
    const sv = document.getElementById('source-video');
    sv.src = URL.createObjectURL(item.videoFile);
    await new Promise(r => sv.onloadedmetadata = r);

    const rc = document.getElementById('render-canvas'), rx = rc.getContext('2d');
    rc.width = 720; rc.height = 1280;

    const fps = 30, dur = item.vEnd - item.vStart;
    const { Muxer, ArrayBufferTarget } = window.Mp4Muxer;
    const muxerCfg = { target: new ArrayBufferTarget(), video: { codec: 'avc', width: 720, height: 1280 }, fastStart: 'in-memory' };
    if (item.audioFile) muxerCfg.audio = { codec: 'aac', numberOfChannels: 2, sampleRate: 48000 };
    const muxer = new Muxer(muxerCfg);

    const ve = new VideoEncoder({ output: (c, m) => muxer.addVideoChunk(c, m), error: e => { throw new Error(e.message); } });
    ve.configure({ codec: 'avc1.42001F', width: 720, height: 1280, bitrate: 8_000_000, framerate: fps, avc: { format: 'avc' } });

    let ae = null, ad = null;
    if (item.audioFile) {
        const ac = new AudioContext({ sampleRate: 48000 }), dec = await ac.decodeAudioData(await item.audioFile.arrayBuffer());
        const ss = Math.floor(item.aStart * dec.sampleRate), sc = Math.floor((item.aStart + dur) * dec.sampleRate) - ss;
        ad = { left: new Float32Array(sc), right: new Float32Array(sc), sampleRate: dec.sampleRate };
        const lc = dec.getChannelData(0), rch = dec.numberOfChannels > 1 ? dec.getChannelData(1) : lc;
        for (let i = 0; i < sc; i++) { ad.left[i] = lc[ss + i] || 0; ad.right[i] = rch[ss + i] || 0; }
        ae = new AudioEncoder({ output: (c, m) => muxer.addAudioChunk(c, m), error: e => { throw new Error(e.message); } });
        ae.configure({ codec: 'mp4a.40.2', sampleRate: 48000, numberOfChannels: 2, bitrate: 128000 });
    }

    sv.currentTime = item.vStart; await new Promise(r => sv.onseeked = r);
    const totalFrames = Math.ceil(dur * fps), tsr = 48000, ssr = ad ? ad.sampleRate : 48000, spf = Math.floor(tsr / fps);
    let aso = 0;

    for (let i = 0; i < totalFrames; i++) {
        sv.currentTime = item.vStart + i / fps; await new Promise(r => sv.onseeked = r);
        if (item.removeWatermark) { const s = 1.1; rx.drawImage(sv, -(sv.videoWidth * s - 720) / 2, -(sv.videoHeight * s - 1280) / 2, sv.videoWidth * s, sv.videoHeight * s); }
        else rx.drawImage(sv, 0, 0, 720, 1280);

        drawCaptionOnCanvas(rx, item.captionSnap, 720, 1280);

        const vf = new VideoFrame(rc, { timestamp: i * 1_000_000 / fps });
        ve.encode(vf, { keyFrame: i % 30 === 0 }); vf.close();

        if (ae && ad) {
            const rr = ssr / tsr, lc = new Float32Array(spf), rch = new Float32Array(spf);
            for (let j = 0; j < spf; j++) { const si = Math.floor(aso + j * rr); lc[j] = si < ad.left.length ? ad.left[si] : 0; rch[j] = si < ad.right.length ? ad.right[si] : 0; }
            const af = new AudioData({ format: 'f32-planar', sampleRate: tsr, numberOfFrames: spf, numberOfChannels: 2, timestamp: i * 1_000_000 / fps, data: new Float32Array([...lc, ...rch]) });
            ae.encode(af); af.close(); aso += Math.floor(spf * rr);
        }
        if (onProgress) onProgress(Math.round(i / totalFrames * 100));
        if (i % 10 === 0) await new Promise(r => setTimeout(r, 0));
    }
    await ve.flush(); if (ae) await ae.flush(); muxer.finalize();
    const blob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

        const state = captureCurrentState(); if (state) videoQueue.push(state);
        await new Promise(r => setTimeout(r, 150));
    }
    currentQueueIndex = videoQueue.length - 1; updateQueueUI();
    btn.disabled = false; btn.innerHTML = '<i data-lucide="zap" class="w-3 h-3"></i> Auto'; lucide.createIcons();
    notify(`✓ ${videoQueue.length} in coda`, 'green');
};

// ── Export All ──
document.getElementById('export-all-btn').onclick = async () => {
    if (!videoQueue.length) { notify('La coda è vuota!', 'red'); return; }
    const exportAllBtn = document.getElementById('export-all-btn'), status = document.getElementById('export-status'), statusText = document.getElementById('status-text'), progress = document.getElementById('progress-bar'), percentText = document.getElementById('percent-text');
    exportAllBtn.disabled = true; status.classList.remove('hidden');
    try {
        for (let qi = 0; qi < videoQueue.length; qi++) {
            const item = videoQueue[qi];
            statusText.innerText = `Video ${qi + 1}/${videoQueue.length}...`; progress.style.width = '0%'; percentText.innerText = '0%';
            const fname = `TikTok_${qi + 1}_${(item.rawCaption || 'video').replace(/\n/g, ' ').substring(0, 30).replace(/[^a-z0-9]/gi, '_')}.mp4`;
            await runExport(item, fname, p => { progress.style.width = p + '%'; percentText.innerText = p + '%'; });
            await new Promise(r => setTimeout(r, 500));
        }
        statusText.innerText = 'Tutti esportati!'; percentText.innerText = '100%'; progress.style.width = '100%';
        setTimeout(() => { status.classList.add('hidden'); exportAllBtn.disabled = false; }, 3000);
    } catch (err) { console.error(err); statusText.innerText = 'Errore: ' + err.message; setTimeout(() => { status.classList.add('hidden'); exportAllBtn.disabled = false; }, 3000); }
