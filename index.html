<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ads Creator | Soundvertise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Courier+Prime:wght@400;700&family=Inter:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.js"></script>
    <style>
        :root { --sv-purple: #8B5CF6; --sv-blue: #3B82F6; --sv-bg: #050505; }
        body { background-color: var(--sv-bg); color: #ffffff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .iphone-frame { width: 290px; height: 515px; border: 10px solid #1A1A1A; border-radius: 42px; position: relative; background: #000; overflow: hidden; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        .video-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #caption-overlay { position: absolute; cursor: move; user-select: none; text-align: center; max-width: 85%; z-index: 30; line-height: 1.1; left: 50%; transform: translateX(-50%); paint-order: stroke fill; }
        .text-bold-outline { text-shadow: 0 0 1px #000, -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0px 3px 8px rgba(0,0,0,0.6); }
        .btn-sv { background: linear-gradient(135deg, var(--sv-blue) 0%, var(--sv-purple) 100%); transition: all 0.3s ease; }
        .btn-sv:hover { filter: brightness(1.1); transform: scale(1.02); }
        #render-canvas { display: none; }
        .trimmer-track { position: relative; width: 100%; background: #111; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .trim-overlay { position: absolute; top: 0; height: 100%; z-index: 5; border-radius: 6px; background: rgba(59, 130, 246, 0.2); border: 2px solid var(--sv-blue); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
        <div class="flex flex-col items-center space-y-4">
            <div class="iphone-frame" id="iphone">
                <div class="video-container" id="drop-zone">
                    <video id="main-video" crossorigin="anonymous" playsinline loop></video>
                    <div id="caption-overlay" class="text-bold-outline" style="top: 35%; font-size: 24px; color: white;">
                        Trascina questo testo
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="remove-watermark-btn" class="px-4 py-2 bg-zinc-800 rounded-lg text-[10px] font-bold border border-zinc-700 hover:border-red-500 transition-all">
                    RIMUOVI WATERMARK VEO (AUTO-ZOOM)
                </button>
            </div>
        </div>

        <div class="bg-zinc-900/80 p-6 rounded-[2rem] border border-zinc-800 space-y-6">
            <header>
                <h1 class="text-xl font-black italic uppercase">Video <span class="text-blue-400">Ads Creator</span></h1>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <input type="file" id="video-input" accept="video/*" class="hidden">
                <label for="video-input" class="p-4 bg-black border border-zinc-800 rounded-xl cursor-pointer text-center text-xs">Carica Video</label>
                <input type="textarea" id="caption-input" placeholder="Modifica testo..." class="bg-black border border-zinc-800 p-4 rounded-xl text-xs outline-none">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] text-zinc-500 uppercase font-black">Posizione verticale: <span id="pos-val">35</span>%</label>
                <input type="range" id="pos-range" min="5" max="90" value="35" class="w-full">
            </div>

            <button id="export-btn" class="w-full btn-sv text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">
                Scarica Video Senza Watermark
            </button>
            
            <div id="status" class="hidden text-center text-blue-400 text-xs font-bold animate-pulse">
                Elaborazione video in corso... <span id="progress">0</span>%
            </div>
        </div>
    </div>

    <canvas id="render-canvas"></canvas>

    <script>
        const video = document.getElementById('main-video');
        const caption = document.getElementById('caption-overlay');
        const posRange = document.getElementById('pos-range');
        const captionInput = document.getElementById('caption-input');
        const exportBtn = document.getElementById('export-btn');
        const statusDiv = document.getElementById('status');
        
        let removeWatermark = false;
        let vStart = 0, vEnd = 10; // Default 10 secondi

        // 1. Sincronizzazione Testo e Posizione
        captionInput.addEventListener('input', (e) => {
            caption.innerText = e.target.value || "Trascina questo testo";
        });

        posRange.addEventListener('input', (e) => {
            caption.style.top = e.target.value + '%';
            document.getElementById('pos-val').innerText = e.target.value;
        });

        document.getElementById('remove-watermark-btn').onclick = function() {
            removeWatermark = !removeWatermark;
            this.classList.toggle('bg-red-900/30');
            this.classList.toggle('border-red-500');
            this.innerText = removeWatermark ? "WATERMARK REMOVER ATTIVO" : "RIMUOVI WATERMARK VEO (AUTO-ZOOM)";
            video.style.transform = removeWatermark ? "scale(1.1)" : "scale(1)";
        };

        document.getElementById('video-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => vEnd = Math.min(video.duration, 15);
            }
        };

        // 2. LOGICA DI EXPORT CORRETTA
        exportBtn.onclick = async () => {
            if (!video.src) return alert("Carica un video!");
            
            exportBtn.disabled = true;
            statusDiv.classList.remove('hidden');
            
            const canvas = document.getElementById('render-canvas');
            const ctx = canvas.getContext('2d');
            
            // Definiamo risoluzione TikTok standard
            canvas.width = 720;
            canvas.height = 1280;

            const { muxer, ArrayBufferTarget } = mp4muxer;
            let mp4Muxer = new muxer({
                target: new ArrayBufferTarget(),
                video: { codec: 'avc1.42E01E', width: 720, height: 1280 },
                fastStart: 'fragmented'
            });

            let videoEncoder = new VideoEncoder({
                output: (chunk, meta) => mp4Muxer.addVideoChunk(chunk, meta),
                error: (e) => console.error(e)
            });

            videoEncoder.configure({ codec: 'avc1.42E01E', width: 720, height: 1280, bitrate: 4_000_000 });

            const fps = 30;
            const totalFrames = (vEnd - vStart) * fps;
            
            for (let i = 0; i <= totalFrames; i++) {
                const currentTime = vStart + (i / fps);
                video.currentTime = currentTime;
                
                await new Promise(r => video.onseeked = r);

                // --- DISEGNO VIDEO ---
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (removeWatermark) {
                    // Zoom del 12% per tagliare i bordi dove sta il watermark
                    const zoom = 1.12;
                    const w = canvas.width * zoom;
                    const h = canvas.height * zoom;
                    const x = (canvas.width - w) / 2;
                    const y = (canvas.height - h) / 2;
                    ctx.drawImage(video, x, y, w, h);
                } else {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }

                // --- DISEGNO CAPTION (Posizione corretta) ---
                const fontSize = 42; // Scalato per 720p
                ctx.font = `bold ${fontSize}px Montserrat, sans-serif`;
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 10;
                
                // Calcolo Y identico all'anteprima percentuale
                const yPos = (posRange.value / 100) * canvas.height;
                
                // Outline
                ctx.strokeStyle = "black";
                ctx.lineWidth = 6;
                ctx.strokeText(caption.innerText, canvas.width / 2, yPos);
                ctx.fillText(caption.innerText, canvas.width / 2, yPos);

                // Encode frame
                const frame = new VideoFrame(canvas, { timestamp: (i * 1000000) / fps });
                videoEncoder.encode(frame);
                frame.close();

                document.getElementById('progress').innerText = Math.round((i / totalFrames) * 100);
            }

            await videoEncoder.flush();
            mp4Muxer.finalize();
            
            const blob = new Blob([mp4Muxer.target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "video_ads_soundvertise.mp4";
            a.click();
            
            statusDiv.classList.add('hidden');
            exportBtn.disabled = false;
        };
    </script>
</body>
</html>
