<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Promo Video Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body { font-family: 'Montserrat', sans-serif; background:#111; color:#fff; display:flex; flex-direction:column; align-items:center; padding:20px; }
    video { max-width: 600px; width:100%; margin-bottom:10px; border-radius:10px; }
    #caption-overlay { position:absolute; top:10%; left:50%; transform:translateX(-50%); color:#fff; font-size:24px; text-align:center; max-width:90%; text-shadow: 2px 2px 5px #000; pointer-events:none; }
    .btn { margin:5px; padding:8px 12px; background:#222; border:none; border-radius:6px; cursor:pointer; color:#fff; }
    .btn.active { background:#f59e0b; color:#111; }
    .controls { margin:10px 0; display:flex; flex-wrap:wrap; justify-content:center; }
    .font-btn { margin:2px; }
    #caption-input { width:80%; padding:6px; margin:10px 0; border-radius:6px; border:none; font-size:18px; }
    .text-bold-outline { -webkit-text-stroke: 1px black; font-weight:bold; }
</style>
</head>
<body>

<h1 class="text-3xl mb-4">Music Promo Video Editor</h1>

<div style="position:relative; display:inline-block;">
    <video id="video" controls>
        <source src="your-video.mp4" type="video/mp4">
        Il tuo browser non supporta il video.
    </video>
    <div id="caption-overlay"></div>
</div>

<input type="text" id="caption-input" placeholder="Scrivi qui la tua caption...">

<div class="controls">
    <button class="btn" id="play-btn">Play</button>
    <button class="btn" id="pause-btn">Pause</button>
    <button class="btn" id="outline-btn">Outline</button>
</div>

<div class="controls">
    <strong>Font:</strong>
    <button class="btn font-btn active" data-font="font-sans">Sans</button>
    <button class="btn font-btn" data-font="font-serif">Serif</button>
    <button class="btn font-btn" data-font="font-mono">Mono</button>
</div>

<div class="controls">
    <strong>Categoria:</strong>
    <button class="btn caption-cat-btn active" data-category="pov">POV</button>
    <button class="btn caption-cat-btn" data-category="amore">Amore</button>
    <button class="btn caption-cat-btn" data-category="gym">Gym</button>
    <button class="btn caption-cat-btn" data-category="motivazione">Motivazione</button>
    <button class="btn caption-cat-btn" data-category="humor">Humor</button>
    <button class="btn caption-cat-btn" data-category="lifestyle">Lifestyle</button>
</div>

<div class="controls">
    <button class="btn" id="random-caption-btn">Genera Caption Random</button>
</div>

<script>
const video = document.getElementById('video');
const caption = document.getElementById('caption-overlay');
const captionInput = document.getElementById('caption-input');

let outlineEnabled = false;

// --- Play/Pause ---
document.getElementById('play-btn').onclick = () => video.play();
document.getElementById('pause-btn').onclick = () => video.pause();

// --- Outline Toggle ---
document.getElementById('outline-btn').onclick = () => {
    outlineEnabled = !outlineEnabled;
    if(outlineEnabled){
        caption.classList.add('text-bold-outline');
    } else {
        caption.classList.remove('text-bold-outline');
    }
};

// --- Update overlay from input ---
captionInput.addEventListener('input', () => {
    caption.innerText = captionInput.value;
});

// --- Font selection ---
document.querySelectorAll('.font-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        caption.className = '';
        caption.classList.add(btn.dataset.font, outlineEnabled ? 'text-bold-outline' : '');
    });
});

// --- Category selection ---
document.querySelectorAll('.caption-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.caption-cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// --- Captions per categoria orientate a promozione musicale ---

        "Il suono delle chitarre e della voce ti accompagna nei momenti più intimi, rendendo l’amore eterno e reale.",

        "Quando condividi una canzone d’amore, ogni nota diventa un messaggio diretto per l’altra persona.",

        "Ogni battito della canzone ti spinge a correre più veloce, a sollevare più peso e a non mollare mai.",

    lifestyle: [
        "Questa playlist accompagna il tuo stile di vita, rendendo ogni giornata più energica e piena di vibrazioni positive.",
        "Ogni traccia è pensata per momenti di relax, lavoro creativo o viaggi, trasformando l’esperienza in pura musica.",
        "Ascoltare queste canzoni ti ispira a esplorare nuovi luoghi, incontrare nuove persone e vivere pienamente.",
        "Ogni beat ti ricorda che il tempo è prezioso e che la musica rende ogni attimo speciale.",
        "Questa selezione di brani è perfetta per accompagnare le tue routine quotidiane e valorizzare ogni momento.",
        "Il ritmo della musica si adatta al tuo stile di vita, creando energia e motivazione in ogni situazione.",
        "Ogni melodia è pensata per farti sentire libero, creativo e in sintonia con il mondo che ti circonda.",
        "La playlist ideale per chi vuole vivere con entusiasmo, emozione e passione per la musica.",
        "Ogni canzone ti guida in un viaggio sensoriale fatto di suoni, colori e momenti indimenticabili.",
        "Ascoltando questi brani, senti che la tua vita è una colonna sonora di esperienze uniche e memorabili."
        // aggiungi fino a 50 frasi
    ]
};

// --- Random Caption ---
document.getElementById('random-caption-btn').onclick = () => {
    const activeCat = document.querySelector('.caption-cat-btn.active').dataset.category;
    const catCaptions = captions[activeCat];
    const rand = catCaptions[Math.floor(Math.random() * catCaptions.length)];
    captionInput.value = rand;
    caption.innerText = rand;
};
</script>

</body>
</html>
