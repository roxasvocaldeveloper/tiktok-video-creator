<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ads Creator | Soundvertise</title>
    <script src="https://cdn.tailwindcss.com">
// ── Spotify Logo overlay ──
const spotifyOverlay=document.getElementById('spotify-overlay');
const spotifySizeSlider=document.getElementById('spotify-size');
const spVal=document.getElementById('sp-val');
const spotifyControls=document.getElementById('spotify-controls');
let spotifyVisible=false,dragSpotify=false,spDragStartY,spDragStartTop;

document.getElementById('toggle-spotify').onclick=function(){
    spotifyVisible=!spotifyVisible;
    const btn=this;
    if(spotifyVisible){
        btn.classList.add('active');
        btn.style.background='rgba(29,185,84,0.15)';
        btn.style.borderColor='#1DB954';
        btn.style.color='#1DB954';
        spotifyControls.classList.remove('hidden');
    } else {
        spotifyOverlay.style.display='none';
        spotifyOverlay.classList.remove('revealed');
        btn.classList.remove('active');
        btn.style.background='#111';
        btn.style.borderColor='#333';
        btn.style.color='#666';
        spotifyControls.classList.add('hidden');
    }
    markChanged();
};

spotifySizeSlider.oninput=(e)=>{
    const w=parseInt(e.target.value);
    spotifyOverlay.style.width=w+'px';
    spVal.innerText=w+'px';
    // clamp top
    const rect=videoContainer.getBoundingClientRect();
    const overlayH=spotifyOverlay.offsetHeight;
    const currentTop=parseInt(spotifyOverlay.style.top)||0;
    if(currentTop+overlayH>rect.height-4) spotifyOverlay.style.top=Math.max(4,rect.height-overlayH-4)+'px';
    markChanged();
};

spotifyOverlay.onmousedown=(e)=>{dragSpotify=true;spDragStartY=e.clientY;spDragStartTop=spotifyOverlay.offsetTop;spotifyOverlay.classList.add('dragging');e.preventDefault();e.stopPropagation();};
window.addEventListener('mousemove',(e)=>{
    if(!dragSpotify)return;
    const rect=videoContainer.getBoundingClientRect();
    let t=spDragStartTop+(e.clientY-spDragStartY);
    t=Math.max(4,Math.min(t,rect.height-spotifyOverlay.offsetHeight-4));
    spotifyOverlay.style.top=t+'px';
});
window.addEventListener('mouseup',()=>{if(dragSpotify){dragSpotify=false;spotifyOverlay.classList.remove('dragging');markChanged();}});

// ── Snapshot Spotify for export ──
function snapshotSpotify(){
    if(!spotifyVisible)return null;
    const cr=videoContainer.getBoundingClientRect();
    const sr=spotifyOverlay.getBoundingClientRect();
    return{
        visible:true,
        topRatio:(sr.top-cr.top)/cr.height,
        widthRatio:sr.width/cr.width,
    };
}

// ── Draw Spotify on canvas during export ──
function drawSpotifyOnCanvas(ctx,snap,canvasW,canvasH,img){
    if(!snap||!snap.visible||!img)return;
    const w=snap.widthRatio*canvasW;
    const h=w*(img.naturalHeight/img.naturalWidth);
    const x=(canvasW-w)/2;
    const y=snap.topRatio*canvasH;
    ctx.drawImage(img,x,y,w,h);
}

</script>
</body>
</html>
