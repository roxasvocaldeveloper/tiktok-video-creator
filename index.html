<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Video Ads Creator | Soundvertise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Courier+Prime:wght@700&family=Inter:wght@800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/mp4-muxer@latest/build/mp4-muxer.js"></script>
    <style>
        :root { --sv-purple: #8B5CF6; --sv-blue: #3B82F6; --sv-bg: #050505; }
        body { background-color: var(--sv-bg); color: #ffffff; font-family: 'Inter', sans-serif; }
        .iphone-frame { width: 290px; height: 515px; border: 10px solid #1A1A1A; border-radius: 42px; position: relative; overflow: hidden; background: #000; }
        #caption-overlay { 
            position: absolute; text-align: center; max-width: 85%; z-index: 30; 
            left: 50%; transform: translateX(-50%); white-space: pre-wrap; line-height: 1.2;
        }
        #render-canvas { display: none; }
        .btn-sv { background: linear-gradient(135deg, var(--sv-blue) 0%, var(--sv-purple) 100%); }
    </style>
</head>
<body class="p-8 flex flex-col items-center">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 max-w-6xl w-full">
        <div class="flex flex-col items-center gap-6">
            <div class="iphone-frame" id="drop-zone">
                <video id="main-video" class="w-full h-full object-cover" loop muted></video>
                <div id="caption-overlay" style="top: 30%; font-size: 20px; color: white;">Anteprima Testo</div>
            </div>
        </div>

        <div class="bg-zinc-900 p-8 rounded-3xl space-y-6">
            <textarea id="caption-input" rows="3" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-white" placeholder="Inserisci testo (usa Invio per i ritorni a capo)"></textarea>
            
            <div class="flex gap-4">
                <input type="color" id="text-color" value="#ffffff">
                <input type="range" id="font-size" min="12" max="60" value="24">
            </div>

            <button id="export-btn" class="btn-sv w-full py-4 rounded-xl font-bold uppercase tracking-widest">
                Esporta Video
            </button>
            <div id="status" class="text-blue-400 text-sm font-bold text-center"></div>
        </div>
    </div>

    <canvas id="render-canvas"></canvas>

    <script>
        const video = document.getElementById('main-video');
        const captionPreview = document.getElementById('caption-overlay');
        const captionInput = document.getElementById('caption-input');
        const exportBtn = document.getElementById('export-btn');
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');

        // Sincronizza input con preview rispettando gli a capo
        captionInput.addEventListener('input', () => {
            captionPreview.innerText = captionInput.value;
        });

        async function exportVideo() {
            const status = document.getElementById('status');
            status.innerText = "Inizio esportazione...";
            
            const canvasW = 1080;
            const canvasH = 1920;
            canvas.width = canvasW;
            canvas.height = canvasH;

            // Configurazione Muxer
            let muxer = new Mp4Muxer.Muxer({
                target: new Mp4Muxer.ArrayBufferTarget(),
                video: { codec: 'avc1.42E01E', width: canvasW, height: canvasH },
                fastStart: 'fragmented'
            });

            let videoEncoder = new VideoEncoder({
                output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                error: (e) => console.error(e)
            });

            videoEncoder.configure({ codec: 'avc1.42E01E', width: canvasW, height: canvasH, bitrate: 5_000_000 });

            const duration = 5; // Durata export in secondi
            const fps = 30;
            const totalFrames = duration * fps;

            for (let i = 0; i < totalFrames; i++) {
                const timestamp = (i / fps) * 1_000_000;
                video.currentTime = i / fps;
                await new Promise(r => video.onseeked = r);

                // 1. Disegna Frame Video
                ctx.drawImage(video, 0, 0, canvasW, canvasH);

                // 2. Disegna Caption con gestione manuale ritorni a capo
                const fontSize = parseInt(document.getElementById('font-size').value) * 3; // Scala per 1080p
                ctx.font = `bold ${fontSize}px Inter, sans-serif`;
                ctx.fillStyle = document.getElementById('text-color').value;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                const text = captionInput.value;
                const lines = text.split('\n'); // Divide il testo per ogni "Invio" premuto
                const lineHeight = fontSize * 1.2;
                const startY = (canvasH * parseFloat(captionPreview.style.top) / 100);

                lines.forEach((line, index) => {
                    ctx.fillText(line, canvasW / 2, startY + (index * lineHeight));
                });

                const frame = new VideoFrame(canvas, { timestamp });
                videoEncoder.encode(frame, { keyFrame: i % 30 === 0 });
                frame.close();
                
                status.innerText = `Rendering: ${Math.round((i/totalFrames)*100)}%`;
            }

            await videoEncoder.flush();
            muxer.finalize();
            
            const blob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'video_ads.mp4';
            a.click();
            status.innerText = "Completato!";
        }

        exportBtn.onclick = exportVideo;

        // Gestione caricamento video per anteprima
        document.body.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.onchange = (e) => {
                video.src = URL.createObjectURL(e.target.files[0]);
                video.play();
            };
            // input.click(); // Rimuovere il commento per testare caricamento
        });
    </script>
</body>
</html>
