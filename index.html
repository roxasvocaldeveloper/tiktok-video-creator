<script>
    // ... (resto del codice precedente per caricamento video e setup muxer)

    /**
     * FUNZIONE DI RENDERING CORRETTA PER EXPORT
     * Questa versione risolve il problema dei ritorni a capo (newline)
     */
    function drawCaptions(ctx, canvasW, canvasH) {
        // Recuperiamo i dati dall'anteprima per replicarli esattamente
        const overlay = document.getElementById('caption-overlay');
        const text = document.getElementById('caption-input').value; // Usiamo .value per avere i \n puri
        const fontSize = parseInt(document.getElementById('font-size').value) * (canvasH / 515); // Scaliamo rispetto all'altezza della preview
        const color = document.getElementById('text-color').value;
        const topPercent = parseFloat(overlay.style.top) || 30;
        
        // Configurazione Font
        let fontFamily = 'Inter';
        if (overlay.classList.contains('font-serif')) fontFamily = 'Courier Prime';
        if (overlay.classList.contains('font-handwriting')) fontFamily = 'Dancing Script';
        
        ctx.font = `800 ${fontSize}px ${fontFamily}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        // Dividiamo il testo in righe basandoci sui ritorni a capo manuali (\n)
        const lines = text.split('\n');
        
        // Calcolo altezza riga: deve matchare il line-height 1.2 del CSS
        const lineHeight = fontSize * 1.2;
        
        // Posizione iniziale Y scalata
        let startY = (canvasH * topPercent) / 100;

        lines.forEach((lineText, idx) => {
            const currentY = startY + (idx * lineHeight);

            // Se la riga è vuota, non disegniamo nulla ma il ciclo continua 
            // spostando la coordinata Y per la riga successiva (creando lo spazio)
            if (lineText.trim().length > 0) {
                
                // Gestione Outline (se presente nel tuo tool)
                const hasOutline = true; // Imposta in base ai tuoi toggle
                if (hasOutline) {
                    ctx.strokeStyle = '#000000'; // O colore scelto
                    ctx.lineWidth = fontSize * 0.15;
                    ctx.lineJoin = 'round';
                    ctx.strokeText(lineText, canvasW / 2, currentY);
                }

                // Disegno testo principale
                ctx.fillStyle = color;
                ctx.fillText(lineText, canvasW / 2, currentY);
            }
        });
    }

    // ESEMPIO DI INTEGRAZIONE NEL CICLO DI EXPORT:
    // All'interno del tuo loop di encoding, dove disegni sul canvas:
    /*
       ctx.drawImage(video, 0, 0, canvasW, canvasH);
       drawCaptions(ctx, canvasW, canvasH); 
    */

</script>
